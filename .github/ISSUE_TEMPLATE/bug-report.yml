name: 🐛 Bug Report
description: Report an issue with fresh-normalize
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much information as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Tell us what you see...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Apply fresh-normalize.css
        2. Add this HTML: ...
        3. See that element X looks wrong
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: fresh-normalize Version
      placeholder: e.g. 1.0.0
    validations:
      required: true

  - type: dropdown
    id: browsers
    attributes:
      label: Affected Browsers
      multiple: true
      options:
        - Chrome / Chromium
        - Firefox
        - Safari
        - Edge
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: codepen
    attributes:
      label: CodePen / Reproduction Link
      description: A minimal reproduction is extremely helpful. Try CodePen or StackBlitz.
      placeholder: https://codepen.io/...

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I've searched existing issues and this is not a duplicate
          required: true
        - label: I've confirmed this happens with only fresh-normalize applied
          required: true
