name: ✨ Feature Request
description: Suggest an improvement or new feature
labels:
  - enhancement
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea clearly.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the current pain point?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What CSS rule or change would address this?
      placeholder: |
        Add this rule:
        element {
          property: value;
        }
    validations:
      required: true

  - type: textarea
    id: browsers
    attributes:
      label: Browser Inconsistency
      description: Which browsers behave differently? Include browser versions if known.
      placeholder: Chrome 120 does X, but Firefox 121 does Y...

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which category does this fall under?
      options:
        - Typography
        - Forms
        - Tables
        - Media (images, video, etc.)
        - Interactive elements
        - Accessibility
        - Dark mode
        - Print styles
        - Motion / Animation
        - New category (describe in comments)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: This is a browser inconsistency fix, not a design preference
          required: false
        - label: This affects modern browsers (Chrome 120+, Firefox 120+, Safari 17+)
          required: false
        - label: I've checked MDN/caniuse and confirmed browser support
          required: false
